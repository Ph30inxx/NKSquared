[pytest]
# ── Test discovery ────────────────────────────────────────────────────────────
testpaths = tests
python_files   = test_*.py
python_classes = Test*
python_functions = test_*

# ── Markers ───────────────────────────────────────────────────────────────────
markers =
    unit:        Pure date-arithmetic tests — no DB or Azure OpenAI required
    integration: Requires running PostgreSQL + Azure OpenAI (always true inside Docker)

# ── Output ────────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers

# ── Warnings ─────────────────────────────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning:agno
    ignore::DeprecationWarning:pydantic
