services:
  postgres:
    image: agnohq/pgvector:16
    container_name: nksquared_postgres
    environment:
      POSTGRES_DB: nksquared
      POSTGRES_USER: nksquared_user
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nksquared_user -d nksquared"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nksquared_redis
    ports:
      - "6379:6379"

  api:
    build: ./backend
    container_name: nksquared_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./samples:/samples:ro
      - ./data:/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    container_name: nksquared_worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./data:/data
    command: celery -A app.tasks.celery_app worker -l info

  beat:
    build: ./backend
    container_name: nksquared_beat
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app beat -l info

  frontend:
    build: ./frontend
    container_name: nksquared_frontend
    environment:
      VITE_API_URL:     http://api:8000
      VITE_CHATBOT_URL: http://chatbot:8001
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  chatbot:
    build:
      context: ./chatbot
      dockerfile: Dockerfile
    container_name: nksquared_chatbot
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      # Azure OpenAI — set these in your .env file
      AZURE_OPENAI_ENDPOINT:    ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_API_KEY:     ${AZURE_OPENAI_API_KEY}
      AZURE_OPENAI_DEPLOYMENT:  ${AZURE_OPENAI_DEPLOYMENT}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
